<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Xe mini 🐾</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Styling dành riêng cho trang Admin Dashboard */
    .admin-layout {
      max-width: 1200px;
      width: 95%;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .admin-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .admin-logout-btn {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .admin-logout-btn:hover {
      background: #e74c3c;
      color: white;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      width: 100%;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    }

    .stat-val {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary-color);
      font-family: 'Fredoka', sans-serif;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .dashboard-content-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      width: 100%;
    }

    @media (max-width: 900px) {
      .dashboard-content-grid {
        grid-template-columns: 1fr;
      }
    }

    #admin-map {
      height: 480px;
      border-radius: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
      z-index: 1;
    }

    .bookings-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 480px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .booking-item {
      background: rgba(255, 255, 255, 0.45);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
    }

    .booking-item:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: var(--primary-light);
      transform: translateY(-2px);
    }

    .booking-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .booking-item-name {
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 1.1rem;
    }

    .booking-item-time {
      font-size: 0.8rem;
      background: rgba(230, 126, 34, 0.15);
      color: var(--primary-dark);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .booking-item-body {
      font-size: 0.88rem;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .booking-item-meta {
      display: flex;
      gap: 15px;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      padding-top: 8px;
      margin-top: 5px;
    }

    .booking-item-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
    }

    .complete-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .complete-btn:hover {
      background: var(--primary-dark);
    }

    /* Feedback badge in list */
    .feedback-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(241, 196, 15, 0.15);
      color: #b7950b;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .photo-attached-btn {
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: #27ae60;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .photo-attached-btn:hover {
      background: #2ecc71;
      color: white;
    }

    /* Modal hiển thị ảnh feedback */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 10px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      animation: modalScaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalScaleIn {
      from { transform: scale(0.85); }
      to { transform: scale(1); }
    }

    .modal-img {
      width: 100%;
      border-radius: 12px;
      display: block;
      max-height: 400px;
      object-fit: contain;
    }

    .modal-close {
      position: absolute;
      top: -15px;
      right: -15px;
      width: 32px;
      height: 32px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Màn hình Đăng nhập Admin */
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      text-align: center;
    }

    .login-logo {
      font-size: 3.5rem;
      animation: catBounce 1.5s infinite ease-in-out;
    }

    .login-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.8rem;
      color: var(--primary-color);
      margin-bottom: 20px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .login-input {
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid var(--card-border);
      border-radius: 14px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: all 0.2s;
    }

    .login-input:focus {
      border-color: var(--primary-light);
      background: white;
      box-shadow: 0 0 0 4px var(--input-focus);
    }

    .login-btn {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(230, 126, 34, 0.2);
      transition: all 0.2s;
    }

    .login-btn:hover {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-color) 100%);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <!-- Floating cats background -->
  <div class="cat-bg" id="cat-bg"></div>

  <!-- 1. MÀN HÌNH ĐĂNG NHẬP -->
  <div id="login-screen" class="login-container">
    <div class="glass-card" style="padding: 30px;">
      <div class="login-logo">🐱</div>
      <h2 class="login-title">Tài xế Xe mini</h2>
      <form id="admin-login-form" class="login-form" onsubmit="return false;">
        <input type="password" id="admin-pass-input" class="login-input" placeholder="Nhập mật khẩu Admin..." required autofocus>
        <button type="submit" class="login-btn">Đăng nhập</button>
      </form>
    </div>
  </div>

  <!-- 2. MÀN HÌNH DASHBOARD QUẢN TRỊ (Ẩn mặc định) -->
  <div id="dashboard-screen" class="admin-layout hidden">
    
    <!-- Header -->
    <header class="glass-card admin-header-row" style="padding: 16px 24px;">
      <div>
        <h1 class="success-title" style="font-size: 1.8rem; margin: 0;">🐾 Bảng điều khiển Xe mini</h1>
        <p class="stat-label" style="margin: 3px 0 0;">Chào mừng Admin quay trở lại!</p>
      </div>
      <button id="logout-btn" class="admin-logout-btn">Đăng xuất</button>
    </header>

    <!-- Thống kê nhanh -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total-bookings">0</div>
        <div class="stat-label">Tổng lượt yêu cầu</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-active-bookings">0</div>
        <div class="stat-label">Đang chờ đón</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-avg-rating">—</div>
        <div class="stat-label">Đánh giá trung bình</div>
      </div>
    </div>

    <!-- Nội dung chính (Map & List) -->
    <div class="dashboard-content-grid">
      
      <!-- Panel Bản đồ vị trí -->
      <div id="admin-map"></div>

      <!-- Panel Danh sách Bookings -->
      <div class="glass-card" style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
        <h3 style="font-family: 'Fredoka', sans-serif; font-size: 1.3rem; color: var(--primary-dark); margin: 0; display: flex; align-items: center; gap: 8px;">
          📋 Danh sách yêu cầu đón
        </h3>
        <div class="bookings-panel" id="bookings-list-container">
          <p style="text-align: center; color: var(--text-muted); margin: 40px 0;">Đang tải danh sách...</p>
        </div>
      </div>

    </div>

  </div>

  <!-- Modal xem ảnh feedback -->
  <div id="photo-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn">✕</button>
      <img id="modal-img-element" class="modal-img" src="" alt="Feedback Photo">
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Logic Admin Dashboard -->
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
